<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台北基督之家 兒童牧區新朋友登記系統</title>
  
  <!-- 引入 React 核心庫 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Babel 用於在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 引入 Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      background-color: #f0fdf4;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    * {
      box-sizing: border-box;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── colour tokens ──────────────────────────────────────────────────────────
    const C = {
      green50:  "#f0fdf4", green100: "#dcfce7", green200: "#bbf7d0",
      green400: "#4ade80", green500: "#22c55e", green600: "#16a34a",
      green700: "#15803d", green800: "#166534",
      blue50:   "#eff6ff", blue100: "#dbeafe", blue500: "#3b82f6", blue600: "#2563eb",
      pink50:   "#fdf2f8", pink100: "#fce7f3", pink500: "#ec4899",
      gray50:   "#f9fafb", gray100: "#f3f4f6", gray200: "#e5e7eb",
      gray300:  "#d1d5db", gray400: "#9ca3af", gray500: "#6b7280",
      gray600:  "#4b5563", gray700:  "#374151", gray800: "#1f2937",
      white:    "#ffffff", red500: "#ef4444", amber500: "#f59e0b",
    };

    const GRADES = ["幼兒園","一年級","二年級","三年級","四年級","五年級","六年級"];
    const SESSIONS = ["第一堂","第二堂"];
    const today = () => new Date().toISOString().slice(0,10);

    const emptyForm = () => ({
      date: today(), service: "", name: "", englishName: "", gender: "",
      birthdate: "", school: "", grade: "", homePhone: "", address: "",
      parentName: "", parentRelation: "", parentPhone: "", lineId: "",
    });

    // ── Firebase 設定與資料庫 helpers ──────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyDRLqSbwk2-xB-9QC66A4cZwzfJ0byx-dw",
      authDomain: "hockidsagapelove.firebaseapp.com",
      projectId: "hockidsagapelove",
      storageBucket: "hockidsagapelove.firebasestorage.app",
      messagingSenderId: "652167376901",
      appId: "1:652167376901:web:f5fe339c834970ee0a6c6c",
      measurementId: "G-90VFYZKR4M"
    };

    // 初始化 Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const collectionRef = db.collection('hockids_records_v2');

    async function dbLoad() {
      try {
        const snapshot = await collectionRef.orderBy('createdAt', 'desc').get();
        return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      } catch (e) {
        console.error("Firebase 讀取失敗:", e);
        alert("資料庫讀取失敗，請確認 Firebase 權限設定 (Firestore Rules)");
        return [];
      }
    }

    // ── tiny icon helpers ──────────────────────────────────────────────────────
    const Icon = ({ d, size = 18, color = "currentColor", style = {} }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
        stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
        style={{ flexShrink: 0, ...style }}>
        <path d={d} />
      </svg>
    );
    const ICONS = {
      lock:     "M12 17v-2m-6 2a6 6 0 0 1 12 0v2H6v-2zM12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",
      camera:   "M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z M12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",
      upload:   "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12",
      save:     "M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z M17 21v-8H7v8 M7 3v5h8",
      db:       "M12 2C6.48 2 2 4.24 2 7v10c0 2.76 4.48 5 10 5s10-2.24 10-5V7c0-2.76-4.48-5-10-5z M2 7c0 2.76 4.48 5 10 5s10-2.24 10-5 M2 12c0 2.76 4.48 5 10 5s10-2.24 10-5",
      search:   "M21 21l-6-6m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0z",
      logout:   "M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4 M16 17l5-5-5-5 M21 12H9",
      download: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M7 10l5 5 5-5 M12 15V3",
      trash:    "M3 6h18 M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6 M10 11v6 M14 11v6 M9 6V4h6v2",
      eye:      "M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 12m-3 0a3 3 0 1 0 6 0 3 3 0 0 0-6 0",
      close:    "M18 6L6 18 M6 6l12 12",
      ok:       "M20 6L9 17l-5-5",
      spin:     "M21 12a9 9 0 1 1-6.219-8.56",
      edit:     "M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7 M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z",
      plus:     "M12 5v14 M5 12h14",
    };

    // ── Spinner ────────────────────────────────────────────────────────────────
    function Spinner({ size = 18 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"
          style={{ animation: "spin 0.8s linear infinite" }}>
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
        </svg>
      );
    }

    // ── Field ──────────────────────────────────────────────────────────────────
    function Field({ label, children, half, third, required }) {
      return (
        <div style={{ gridColumn: third ? "span 1" : half ? "span 1" : "span 2", display: "flex", flexDirection: "column", gap: 4 }}>
          <label style={{ fontSize: 12, fontWeight: 500, color: C.gray500 }}>
            {label}{required && <span style={{ color: C.red500 }}> *</span>}
          </label>
          {children}
        </div>
      );
    }

    const inputStyle = {
      padding: "8px 10px", border: `1px solid ${C.gray300}`, borderRadius: 8,
      fontSize: 14, color: C.gray800, background: C.white, outline: "none",
      width: "100%", boxSizing: "border-box",
    };

    function Input({ name, value, onChange, type = "text", placeholder = "" }) {
      return <input type={type} name={name} value={value} onChange={onChange}
        placeholder={placeholder} style={inputStyle} />;
    }
    function Select({ name, value, onChange, options, placeholder = "請選擇" }) {
      return (
        <select name={name} value={value} onChange={onChange} style={inputStyle}>
          <option value="">{placeholder}</option>
          {options.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      );
    }

    // ── Button ─────────────────────────────────────────────────────────────────
    function Btn({ children, onClick, variant = "default", disabled, style = {}, small }) {
      const base = {
        display: "inline-flex", alignItems: "center", gap: 6, cursor: disabled ? "not-allowed" : "pointer",
        border: "none", borderRadius: 8, fontWeight: 600, transition: "opacity .15s",
        opacity: disabled ? 0.5 : 1, fontSize: small ? 12 : 14,
        padding: small ? "5px 10px" : "9px 16px",
      };
      const variants = {
        default: { background: C.gray100, color: C.gray700 },
        primary: { background: C.green600, color: C.white },
        blue:    { background: C.blue600,  color: C.white },
        danger:  { background: "#fef2f2", color: C.red500 },
        ghost:   { background: "transparent", color: C.gray500 },
      };
      return (
        <button onClick={onClick} disabled={disabled} style={{ ...base, ...variants[variant], ...style }}>
          {children}
        </button>
      );
    }

    // ── Badge ──────────────────────────────────────────────────────────────────
    function Badge({ gender }) {
      if (!gender) return <span style={{ color: C.gray400, fontSize: 12 }}>—</span>;
      const isBoy = gender === "男生";
      return (
        <span style={{
          fontSize: 11, padding: "2px 8px", borderRadius: 99, fontWeight: 600,
          background: isBoy ? C.blue100 : C.pink100,
          color: isBoy ? C.blue600 : C.pink500,
        }}>{gender}</span>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // FORM PANEL
    // ══════════════════════════════════════════════════════════════════════════
    function FormPanel({ initial, onSaved, onCancel, withPhoto }) {
      const [form, setForm] = useState({ ...emptyForm(), ...initial });
      const [saving, setSaving] = useState(false);
      const [ok, setOk] = useState(false);

      const set = e => setForm(p => ({ ...p, [e.target.name]: e.target.value }));

      const save = async () => {
        if (!form.name && !form.englishName) { alert("請至少填寫姓名"); return; }
        setSaving(true);
        await onSaved(form);
        setSaving(false);
        setOk(true);
        setTimeout(() => setOk(false), 2000);
      };

      const gridStyle = { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px 16px" };

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {/* row 1 */}
          <div style={gridStyle}>
            <Field label="登記日期"><Input name="date" type="date" value={form.date} onChange={set} /></Field>
            <Field label="聚會堂別"><Select name="service" value={form.service} onChange={set} options={SESSIONS} /></Field>
          </div>
          {/* row 2 */}
          <div style={{ ...gridStyle, gridTemplateColumns: "1fr 1fr 1fr" }}>
            <div style={{ gridColumn: "span 2" }}>
              <Field label="中文姓名" required><Input name="name" value={form.name} onChange={set} /></Field>
            </div>
            <Field label="英文名字"><Input name="englishName" value={form.englishName} onChange={set} /></Field>
          </div>
          {/* row 3 */}
          <div style={gridStyle}>
            <Field label="性別"><Select name="gender" value={form.gender} onChange={set} options={["男生","女生"]} /></Field>
            <Field label="出生年月日"><Input name="birthdate" type="date" value={form.birthdate} onChange={set} /></Field>
          </div>
          {/* row 4 */}
          <div style={gridStyle}>
            <Field label="就讀年級"><Select name="grade" value={form.grade} onChange={set} options={GRADES} /></Field>
            <Field label="學校名稱"><Input name="school" value={form.school} onChange={set} /></Field>
          </div>
          {/* contact section */}
          <div style={{ background: C.gray50, border: `1px solid ${C.gray200}`, borderRadius: 10, padding: "12px 14px" }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.gray600, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
              <Icon d={ICONS.lock} size={14} color={C.gray500} /> 聯絡資訊
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "10px 12px" }}>
              <Field label="家長姓名"><Input name="parentName" value={form.parentName} onChange={set} /></Field>
              <Field label="稱謂"><Input name="parentRelation" value={form.parentRelation} onChange={set} /></Field>
              <Field label="家長手機"><Input name="parentPhone" value={form.parentPhone} onChange={set} /></Field>
              <Field label="家裡電話"><Input name="homePhone" value={form.homePhone} onChange={set} /></Field>
              <Field label="LINE ID"><Input name="lineId" value={form.lineId} onChange={set} /></Field>
            </div>
            <div style={{ marginTop: 10 }}>
              <Field label="地址"><Input name="address" value={form.address} onChange={set} /></Field>
            </div>
          </div>

          <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
            <Btn variant="blue" onClick={save} disabled={saving} style={{ flex: 1, justifyContent: "center" }}>
              {saving ? <Spinner size={16} /> : <Icon d={ICONS.save} size={16} color={C.white} />}
              {saving ? "儲存中..." : ok ? "已儲存！" : "儲存至資料庫"}
            </Btn>
            {onCancel && <Btn onClick={onCancel}>取消</Btn>}
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // SCAN TAB
    // ══════════════════════════════════════════════════════════════════════════
    function ScanTab({ onSaved, onScanStateChange }) {
      const [img, setImg]           = useState(null);
      const [scanning, setScanning] = useState(false);
      const [scanned, setScanned]   = useState(null);
      const [msg, setMsg]           = useState(null);
      const camRef    = useRef();
      const uploadRef = useRef();

      const notify = (has) => onScanStateChange && onScanStateChange(has);

      const processFile = useCallback((file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          const image = new Image();
          image.onload = () => {
            const MAX = 1000; let { width: w, height: h } = image;
            if (w > h && w > MAX) { h = h * MAX / w; w = MAX; }
            else if (h > MAX)     { w = w * MAX / h; h = MAX; }
            const canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(image, 0, 0, w, h);
            const dataUrl = canvas.toDataURL("image/jpeg", 0.72);
            setImg(dataUrl); setScanned(null); setMsg(null); notify(false);
            runAnalyse(dataUrl);
          };
          image.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      }, []);

      const handleFileInput = e => {
        processFile(e.target.files[0]);
        e.target.value = "";
      };

      const runAnalyse = async (dataUrl) => {
        setScanning(true); setMsg(null);
        const base64 = dataUrl.split(",")[1];
        
        // 要求或取得 API Key
        let apiKey = localStorage.getItem('CLAUDE_API_KEY');
        if (!apiKey) {
          apiKey = prompt("請輸入您的 Anthropic (Claude) API Key 以啟用 AI 辨識功能：\n(這只會儲存在您的瀏覽器中)");
          if (apiKey) {
            localStorage.setItem('CLAUDE_API_KEY', apiKey.trim());
          } else {
            setMsg({ type: "err", text: "需要 API Key 才能執行辨識，請使用下方手動輸入" });
            setScanning(false);
            return;
          }
        }

        try {
          const resp = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { 
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerously-allow-browser": "true" 
            },
            body: JSON.stringify({
              model: "claude-3-5-sonnet-20240620", // 修正為正確的 Sonnet 模型名稱
              max_tokens: 1000,
              messages: [{
                role: "user",
                content: [
                  { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
                  { type: "text", text: `請辨識這張兒童牧區新朋友登記表，只回傳JSON不要其他文字：{"name":"中文姓名","englishName":"英文名","birthdate":"YYYY-MM-DD","gender":"男生或女生","school":"學校","grade":"幼兒園/一年級/二年級/三年級/四年級/五年級/六年級","homePhone":"家裡電話","address":"地址","parentName":"家長姓名","parentRelation":"稱謂如爸爸媽媽外婆","parentPhone":"家長手機","lineId":"LINE ID","service":"第一堂或第二堂","date":"${today()}"}` }
                ]
              }]
            })
          });
          
          if (!resp.ok) {
            const errBody = await resp.text();
            throw new Error(errBody || "API 請求失敗");
          }
          
          const data = await resp.json();
          const text = data.content?.map(c => c.text || "").join("") || "";
          const clean = text.replace(/```json|```/g, "").trim();
          const parsed = JSON.parse(clean);
          setScanned(parsed); notify(true);
          setMsg({ type: "ok", text: "辨識完成！請確認資料後儲存" });
        } catch(err) {
          console.error(err);
          // 若因為 API Key 錯誤，提示清除
          if (err.message.includes("authentication") || err.message.includes("key")) {
             localStorage.removeItem('CLAUDE_API_KEY');
             setMsg({ type: "err", text: "API Key 錯誤或失效，請重試並重新輸入" });
          } else {
             setMsg({ type: "err", text: "辨識失敗，請確認照片清晰度或使用下方手動輸入" });
          }
          setScanned(null); notify(false);
        } finally { setScanning(false); }
      };

      const reset = () => { setImg(null); setScanned(null); setMsg(null); notify(false); };

      const handleSaved = async form => {
        try {
          await collectionRef.add({
            ...form,
            photoData: img || null,
            createdAt: Date.now()
          });
          onSaved();
          reset();
        } catch (e) {
          console.error("儲存失敗", e);
          alert("儲存失敗，請確認網路連線或資料庫權限");
        }
      };

      return (
        <div style={{ background: C.white, border: `1px solid ${C.green200}`, borderRadius: 12, padding: "1.25rem", display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ fontSize: 15, fontWeight: 600, color: C.gray700, display: "flex", gap: 6, alignItems: "center" }}>
            <Icon d={ICONS.camera} size={16} color={C.green600} /> 拍照辨識
          </div>

          {!img && !scanning && (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <button onClick={() => camRef.current.click()}
                style={{ background: C.green600, border: "none", borderRadius: 12, padding: "1.5rem", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 10, color: C.white }}>
                <div style={{ width: 64, height: 64, borderRadius: "50%", background: "rgba(255,255,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Icon d={ICONS.camera} size={32} color={C.white} />
                </div>
                <span style={{ fontSize: 16, fontWeight: 700 }}>點此開啟相機拍照</span>
                <span style={{ fontSize: 12, opacity: 0.85 }}>拍完後自動辨識，無需再按任何按鈕</span>
              </button>
              <button onClick={() => uploadRef.current.click()}
                style={{ background: C.white, border: `1px solid ${C.gray300}`, borderRadius: 10, padding: "0.9rem", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, color: C.gray600 }}>
                <Icon d={ICONS.upload} size={18} color={C.gray500} />
                <span style={{ fontSize: 14, fontWeight: 500 }}>從相簿選取已有照片</span>
              </button>
            </div>
          )}

          {scanning && (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 14, padding: "2rem 0" }}>
              {img && <img src={img} alt="預覽" style={{ width: "100%", borderRadius: 8, maxHeight: 220, objectFit: "contain", background: C.gray50, opacity: 0.7 }} />}
              <div style={{ display: "flex", alignItems: "center", gap: 10, color: C.green600, fontWeight: 600, fontSize: 14 }}>
                <Spinner size={22} /> AI 辨識中，請稍候...
              </div>
            </div>
          )}

          {img && !scanning && (
            <div style={{ position: "relative" }}>
              <img src={img} alt="預覽" style={{ width: "100%", borderRadius: 8, maxHeight: 260, objectFit: "contain", background: C.gray50 }} />
              <button onClick={reset}
                style={{ position: "absolute", top: 6, right: 6, background: C.red500, border: "none", borderRadius: "50%", width: 28, height: 28, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <Icon d={ICONS.close} size={14} color={C.white} />
              </button>
            </div>
          )}

          {msg && (
            <div style={{ padding: "8px 12px", borderRadius: 8, fontSize: 13, background: msg.type === "ok" ? C.green100 : "#fef2f2", color: msg.type === "ok" ? C.green700 : C.red500 }}>
              {msg.text}
            </div>
          )}

          {msg?.type === "err" && img && (
            <Btn variant="primary" onClick={() => runAnalyse(img)} style={{ justifyContent: "center" }}>
              <Icon d={ICONS.search} size={15} color={C.white} /> 重新辨識
            </Btn>
          )}

          {img && !scanning && (
            <div style={{ display: "flex", gap: 8 }}>
              <Btn onClick={() => camRef.current.click()} style={{ flex: 1, justifyContent: "center" }}>
                <Icon d={ICONS.camera} size={15} color={C.gray600} /> 重新拍照
              </Btn>
              <Btn onClick={() => uploadRef.current.click()} style={{ flex: 1, justifyContent: "center" }}>
                <Icon d={ICONS.upload} size={15} color={C.gray600} /> 換張照片
              </Btn>
            </div>
          )}

          {scanned && (
            <>
              <div style={{ borderTop: `1px solid ${C.green200}`, paddingTop: 12, fontSize: 14, fontWeight: 600, color: C.green700, display: "flex", gap: 6, alignItems: "center" }}>
                <Icon d={ICONS.edit} size={15} color={C.green600} /> 確認並修改資料
              </div>
              <FormPanel initial={scanned} onSaved={handleSaved} />
            </>
          )}

          <input ref={camRef}    type="file" accept="image/*" capture="environment" style={{ display: "none" }} onChange={handleFileInput} />
          <input ref={uploadRef} type="file" accept="image/*"                        style={{ display: "none" }} onChange={handleFileInput} />
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // MANUAL TAB
    // ══════════════════════════════════════════════════════════════════════════
    function ManualTab({ onSaved }) {
      const handleSaved = async form => {
        try {
          await collectionRef.add({
            ...form,
            createdAt: Date.now()
          });
          onSaved();
        } catch (e) {
          console.error("儲存失敗", e);
          alert("儲存失敗，請確認網路連線或資料庫權限");
        }
      };
      return <FormPanel initial={{}} onSaved={handleSaved} />;
    }

    // ══════════════════════════════════════════════════════════════════════════
    // DATABASE TAB
    // ══════════════════════════════════════════════════════════════════════════
    function DBTab() {
      const [unlocked, setUnlocked] = useState(false);
      const [pw, setPw]             = useState("");
      const [err, setErr]           = useState(false);
      const [records, setRecords]   = useState([]);
      const [loading, setLoading]   = useState(false);
      const [search, setSearch]     = useState("");
      const [preview, setPreview]   = useState(null);
      const [editId, setEditId]     = useState(null);

      const unlock = () => {
        if (["HOCKIDS","hockids"].includes(pw.trim())) { setUnlocked(true); setErr(false); }
        else { setErr(true); setPw(""); }
      };

      const load = useCallback(async () => {
        setLoading(true);
        const r = await dbLoad();
        r.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        setRecords(r); setLoading(false);
      }, []);

      useEffect(() => { if (unlocked) load(); }, [unlocked, load]);

      const del = async id => {
        if (!confirm("確定刪除此筆資料？")) return;
        try {
          await collectionRef.doc(id).delete();
          setRecords(prev => prev.filter(r => r.id !== id));
        } catch (e) {
          console.error("刪除失敗", e);
          alert("刪除失敗");
        }
      };

      const updateRecord = async (id, form) => {
        try {
          await collectionRef.doc(id).update(form);
          setRecords(prev => prev.map(r => r.id === id ? { ...r, ...form } : r));
          setEditId(null);
        } catch (e) {
          console.error("更新失敗", e);
          alert("更新失敗");
        }
      };

      const exportCSV = () => {
        const BOM = "\uFEFF";
        const hdr = ["建檔時間","姓名","英文名","性別","堂別","生日","年級","學校","家長姓名","稱謂","家長手機","家裡電話","LINE","地址"];
        const rows = records.map(r => [
          r.createdAt ? new Date(r.createdAt).toLocaleDateString() : "",
          r.name||"", r.englishName||"", r.gender||"", r.service||"",
          r.birthdate||"", r.grade||"", r.school||"",
          r.parentName||"", r.parentRelation||"", r.parentPhone||"",
          r.homePhone||"", r.lineId||"", `"${(r.address||"").replace(/"/g,'""')}"`
        ].join(","));
        const csv = BOM + hdr.join(",") + "\n" + rows.join("\n");
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv;charset=utf-8;" }));
        a.download = `新朋友名單_${today()}.csv`; a.click();
      };

      const q = search.toLowerCase();
      const filtered = q
        ? records.filter(r => [r.name, r.englishName, r.parentName, r.homePhone, r.parentPhone].some(v => (v||"").toLowerCase().includes(q)))
        : records;

      if (!unlocked) return (
        <div style={{ display: "flex", justifyContent: "center", paddingTop: "3rem" }}>
          <div style={{ background: C.white, borderRadius: 16, padding: "2rem", width: 300, textAlign: "center", border: `1px solid ${C.gray200}` }}>
            <div style={{ width: 52, height: 52, borderRadius: "50%", background: C.green100, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 1rem" }}>
              <Icon d={ICONS.lock} size={22} color={C.green700} />
            </div>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 4 }}>安全存取</div>
            <div style={{ fontSize: 13, color: C.gray500, marginBottom: 20 }}>請輸入密碼以檢視名單</div>
            <input type="password" value={pw} onChange={e => { setPw(e.target.value); setErr(false); }}
              onKeyDown={e => e.key === "Enter" && unlock()}
              placeholder="請輸入密碼"
              style={{ ...inputStyle, textAlign: "center", marginBottom: 8, border: `1px solid ${err ? C.red500 : C.gray300}` }} />
            {err && <div style={{ fontSize: 12, color: C.red500, marginBottom: 8 }}>密碼錯誤</div>}
            <Btn variant="primary" onClick={unlock} style={{ width: "100%", justifyContent: "center" }}>解鎖資料庫</Btn>
          </div>
        </div>
      );

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10, marginBottom: 14 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ position: "relative" }}>
                <Icon d={ICONS.search} size={15} color={C.gray400} style={{ position: "absolute", left: 9, top: "50%", transform: "translateY(-50%)" }} />
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="搜尋姓名、家長、電話..."
                  style={{ ...inputStyle, paddingLeft: 30, width: 220 }} />
              </div>
              <span style={{ fontSize: 13, color: C.gray500 }}>共 {filtered.length} 筆</span>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <Btn onClick={exportCSV}><Icon d={ICONS.download} size={15} color={C.gray600} /> 匯出 CSV</Btn>
              <Btn variant="ghost" onClick={() => setUnlocked(false)}><Icon d={ICONS.logout} size={15} /> 登出</Btn>
            </div>
          </div>

          {loading ? (
            <div style={{ textAlign: "center", padding: "3rem", color: C.gray400 }}><Spinner size={24} /></div>
          ) : filtered.length === 0 ? (
            <div style={{ textAlign: "center", padding: "3rem", color: C.gray400, fontSize: 14 }}>尚無資料</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {filtered.map(r => {
                if (editId === r.id) return (
                  <div key={r.id} style={{ background: C.white, border: `1px solid ${C.green200}`, borderRadius: 12, padding: "1.25rem" }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: C.green700, marginBottom: 12 }}>編輯資料</div>
                    <FormPanel initial={r} onSaved={form => updateRecord(r.id, form)} onCancel={() => setEditId(null)} />
                  </div>
                );
                return (
                  <div key={r.id} style={{ background: C.white, border: `1px solid ${C.gray200}`, borderRadius: 12, padding: "12px 16px", display: "flex", gap: 14, alignItems: "flex-start" }}>
                    <div style={{ flexShrink: 0, width: 48, height: 48, borderRadius: 8, background: C.gray100, overflow: "hidden", cursor: r.photoData ? "pointer" : "default" }}
                      onClick={() => r.photoData && setPreview(r.photoData)}>
                      {r.photoData
                        ? <img src={r.photoData} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                        : <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%" }}><Icon d={ICONS.camera} size={18} color={C.gray400} /></div>
                      }
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
                        <span style={{ fontSize: 15, fontWeight: 700, color: C.gray800 }}>{r.name||"—"}</span>
                        {r.englishName && <span style={{ fontSize: 13, color: C.gray500 }}>{r.englishName}</span>}
                        <Badge gender={r.gender} />
                        {r.service && <span style={{ fontSize: 11, background: C.green100, color: C.green700, padding: "2px 8px", borderRadius: 99, fontWeight: 500 }}>{r.service}</span>}
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(160px, 1fr))", gap: "2px 12px" }}>
                        {[
                          ["年級", r.grade],
                          ["生日", r.birthdate],
                          ["家長", r.parentName ? `${r.parentName}（${r.parentRelation||""}）` : ""],
                          ["手機", r.parentPhone || r.homePhone],
                          ["LINE", r.lineId],
                          ["地址", r.address],
                        ].filter(([,v]) => v).map(([k, v]) => (
                          <div key={k} style={{ fontSize: 12, color: C.gray600 }}>
                            <span style={{ color: C.gray400 }}>{k}：</span>{v}
                          </div>
                        ))}
                      </div>
                      {r.createdAt && <div style={{ fontSize: 11, color: C.gray400, marginTop: 4 }}>{new Date(r.createdAt).toLocaleDateString()}</div>}
                    </div>
                    <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                      <Btn small onClick={() => setEditId(r.id)}><Icon d={ICONS.edit} size={14} color={C.gray600} /></Btn>
                      <Btn small variant="danger" onClick={() => del(r.id)}><Icon d={ICONS.trash} size={14} color={C.red500} /></Btn>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {preview && (
            <div onClick={() => setPreview(null)}
              style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 999, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
              <div onClick={e => e.stopPropagation()} style={{ position: "relative", maxWidth: 800, width: "100%" }}>
                <button onClick={() => setPreview(null)}
                  style={{ position: "absolute", top: -36, right: 0, background: "none", border: "none", cursor: "pointer" }}>
                  <Icon d={ICONS.close} size={24} color={C.white} />
                </button>
                <img src={preview} alt="原圖" style={{ width: "100%", borderRadius: 10, maxHeight: "85vh", objectFit: "contain" }} />
              </div>
            </div>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // ADD PAGE
    // ══════════════════════════════════════════════════════════════════════════
    function AddPage({ onSaved }) {
      const [hasScanned, setHasScanned] = useState(false);
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16, maxWidth: 680, margin: "0 auto" }}>
          <ScanTab onSaved={onSaved} onScanStateChange={setHasScanned} />
          {!hasScanned && (
            <div style={{ background: C.white, border: `1px solid ${C.gray200}`, borderRadius: 12, padding: "1.25rem" }}>
              <div style={{ fontSize: 15, fontWeight: 600, color: C.gray700, marginBottom: 14, display: "flex", gap: 6, alignItems: "center" }}>
                <Icon d={ICONS.edit} size={16} color={C.gray500} /> 手動輸入
              </div>
              <ManualTab onSaved={onSaved} />
            </div>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // ROOT APP
    // ══════════════════════════════════════════════════════════════════════════
    function App() {
      const [tab, setTab]         = useState("add");
      const [refresh, setRefresh] = useState(0);

      const tabs = [
        { id: "add", label: "新增登記", icon: ICONS.plus },
        { id: "db",  label: "資料庫",   icon: ICONS.db   },
      ];

      return (
        <div style={{ minHeight: "100vh", background: C.green50 }}>
          <header style={{ background: C.white, borderBottom: `1px solid ${C.green200}`, position: "sticky", top: 0, zIndex: 10 }}>
            <div style={{ maxWidth: 1100, margin: "0 auto", padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ background: C.green600, borderRadius: 10, width: 38, height: 38, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Icon d={ICONS.db} size={20} color={C.white} />
                </div>
                <div>
                  <div style={{ fontSize: 15, fontWeight: 700, color: C.green800, lineHeight: 1.2 }}>台北基督之家 兒童牧區</div>
                  <div style={{ fontSize: 12, color: C.gray500 }}>新朋友登記系統</div>
                </div>
              </div>
              <div style={{ display: "flex", background: C.gray100, borderRadius: 10, padding: 3, gap: 2 }}>
                {tabs.map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)} style={{
                    display: "flex", alignItems: "center", gap: 6, padding: "7px 18px", borderRadius: 8,
                    border: "none", cursor: "pointer", fontSize: 13, fontWeight: tab === t.id ? 600 : 400,
                    background: tab === t.id ? C.white : "transparent",
                    color: tab === t.id ? C.green700 : C.gray500,
                    boxShadow: tab === t.id ? "0 1px 3px rgba(0,0,0,.08)" : "none",
                  }}>
                    <Icon d={t.icon} size={15} color={tab === t.id ? C.green600 : C.gray400} />
                    {t.label}
                  </button>
                ))}
              </div>
            </div>
          </header>

          <main style={{ maxWidth: 1100, margin: "0 auto", padding: "1.5rem 16px" }}>
            {tab === "add" && <AddPage onSaved={() => setRefresh(r => r + 1)} />}
            {tab === "db"  && <DBTab key={refresh} />}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
